name: Publish FHE-dev-GPU image

# Builds the CUDA/FIDESlib server-tier image (environment-gpu/Dockerfile) and
# pushes it to GHCR. Compilation needs no GPU, so this runs on hosted runners;
# the GPU smoke test (fhe-gpu-smoke-test) CANNOT run here — it is executed at
# first use on a GPU host (see the app-gpu runbooks). The only pre-push gate is
# therefore build success + image sanity (binaries and headers present).
#
# Fires on fhe-dev-gpu-v* tags, or manually.
on:
  push:
    tags: ["fhe-dev-gpu-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image version, e.g. v0.1.0"
        required: true
      arch:
        description: "FIDESLIB_ARCH (default 120 = RTX 5090 / Blackwell)"
        required: false
        default: "120"

concurrency:
  group: publish-fhe-dev-gpu-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-check-push:
    runs-on: ubuntu-latest
    timeout-minutes: 240    # patched OpenFHE + FIDESlib CUDA kernels compile from source
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image ref
        id: ref
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          version="${{ github.event.inputs.tag || github.ref_name }}"
          version="${version#fhe-dev-gpu-}"
          echo "image=ghcr.io/$owner/fhe-dev-gpu" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: skills/fhe-application-design/environment-gpu
          file: skills/fhe-application-design/environment-gpu/Dockerfile
          load: true
          push: false
          build-args: |
            FIDESLIB_ARCH=${{ github.event.inputs.arch || '120' }}
          tags: ${{ steps.ref.outputs.image }}:${{ steps.ref.outputs.version }}

      # No GPU on hosted runners: sanity-check contents only.
      - name: Image sanity (no-GPU checks)
        run: |
          img="${{ steps.ref.outputs.image }}:${{ steps.ref.outputs.version }}"
          docker run --rm "$img" bash -c '
            set -e
            test -f /usr/local/bin/fhe-gpu-smoke-test
            ls /usr/local/include | grep -qi fideslib
            ldconfig -p | grep -qi fideslib
            echo "image sanity OK (run fhe-gpu-smoke-test on a GPU host before first use)"'

      - name: Tag :latest and push
        run: |
          img="${{ steps.ref.outputs.image }}"
          ver="${{ steps.ref.outputs.version }}"
          docker tag "$img:$ver" "$img:latest"
          docker push "$img:$ver"
          docker push "$img:latest"
          echo "pushed $img:$ver and $img:latest"
